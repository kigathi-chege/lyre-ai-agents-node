name: Publish Package

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to npm (Trusted Publishing)
    runs-on: ubuntu-latest
    environment: Home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if present)
        run: npm test --if-present

      - name: Run build (if present)
        run: npm run build --if-present

      - name: Check local vs published version
        id: version_check
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          LOCAL_VERSION="$(node -p "require('./package.json').version")"

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"

          echo "Local package: $PACKAGE_NAME@$LOCAL_VERSION"

          set +e
          PUBLISHED_VERSION="$(npm view "$PACKAGE_NAME" version 2>/dev/null)"
          LOOKUP_EXIT_CODE=$?
          set -e

          if [ $LOOKUP_EXIT_CODE -ne 0 ] || [ -z "${PUBLISHED_VERSION:-}" ]; then
            echo "No published version found (or lookup failed). Proceeding to publish."
            echo "published_version=" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Published version: $PUBLISHED_VERSION"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "Version unchanged. Skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version changed. Proceeding to publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish

      - name: Publish skipped
        if: steps.version_check.outputs.should_publish != 'true'
        run: |
          echo "Publish skipped for ${{ steps.version_check.outputs.package_name }}."
          echo "Local version: ${{ steps.version_check.outputs.local_version }}"
          echo "Published version: ${{ steps.version_check.outputs.published_version }}"
